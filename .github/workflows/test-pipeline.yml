name: Test Pipeline

on:
  workflow_dispatch:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit-testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install unit demo dependencies
        working-directory: unit-demo
        run: npm install

      - name: Run unit tests
        working-directory: unit-demo
        run: npm test

  e2e-testing:
    runs-on: ubuntu-latest
    needs: unit-testing
    if: ${{ always() }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install e2e dependencies
        working-directory: e2e-playwright
        run: npm install

      - name: Install Playwright browsers
        working-directory: e2e-playwright
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: e2e-playwright
        run: npm test

      - name: Upload Playwright traces and report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            e2e-playwright/test-results/
            e2e-playwright/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  perf-testing:
    runs-on: ubuntu-latest
    needs: e2e-testing
    if: ${{ always() }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run performance test
        working-directory: performance-demo
        run: mvn -B test
